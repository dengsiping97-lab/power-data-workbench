<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订阅周度跟踪 · 电力数据研究工作台</title>
  <link rel="stylesheet" href="assets/engagement.css">
</head>
<body>
  <div class="eng-app">
    <aside class="eng-sidebar">
      <div class="eng-brand">电力数据<br>研究工作台</div>
      <div class="eng-nav-label">核心模块</div>
      <nav class="eng-nav">
        <a href="index.html">跟踪总览</a>
        <a href="hydro.html">水电跟踪</a>
        <a href="weather.html">负荷气象</a>
        <a href="price.html">电价与市场</a>
        <a href="power.html">电力供需</a>
        <a href="companies.html">公司弹性</a>
        <a class="active" href="subscribe.html">订阅周度跟踪</a>
      </nav>
    </aside>
    <main class="eng-main">
      <div class="eng-eyebrow">WEEKLY TRACKING</div>
      <h1>订阅周度跟踪</h1>
      <p class="eng-subtitle">接收已公开的周度跟踪更新与网站新增内容提示。内容以研究数据和口径说明为主，不构成投资建议。</p>
      <section class="eng-card eng-note">
        <h2>订阅说明</h2>
        <p><strong>该功能待上架，当前暂不接受订阅登记。</strong>正式上线后，已确认订阅者将按固定频率收到周度更新，并可随时通过回复邮件取消订阅。</p>
      </section>
      <section class="eng-card">
        <h2>订阅登记</h2>
        <form data-email-form data-recipient="dengsiping97@gmail.com" data-subject="[电力数据研究工作台] 周度跟踪订阅">
          <div class="eng-fields">
            <div class="eng-field"><label for="subscribe-name">姓名 <span class="eng-required" aria-hidden="true">*</span></label><input id="subscribe-name" name="name" data-label="姓名" autocomplete="name" required></div>
            <div class="eng-field"><label for="subscribe-org">机构 <span class="eng-required" aria-hidden="true">*</span></label><input id="subscribe-org" name="organization" data-label="机构" autocomplete="organization" required></div>
            <div class="eng-field"><label for="subscribe-phone">手机号 <span class="eng-required" aria-hidden="true">*</span></label><input id="subscribe-phone" name="phone" data-label="手机号" type="tel" inputmode="tel" autocomplete="tel" required></div>
            <div class="eng-field"><label for="subscribe-email">邮箱 <span class="eng-required" aria-hidden="true">*</span></label><input id="subscribe-email" name="email" data-label="邮箱" type="email" autocomplete="email" required></div>
            <div class="eng-field full"><label for="subscribe-focus">关注方向</label><select id="subscribe-focus" name="focus" data-label="关注方向"><option>水电与来水</option><option>电价与市场</option><option>电力供需</option><option>公司经营数据</option><option>其他</option></select></div>
          </div>
          <label class="eng-consent"><input type="checkbox" required>我同意仅为周度跟踪订阅和必要的研究交流使用上述联系信息。</label>
          <button class="eng-submit" type="submit" disabled>确认订阅</button>
          <p id="form-status" class="eng-status" aria-live="polite"></p>
        </form>
      </section>
    </main>
  </div>
  <script src="assets/engagement.js"></script>
</body>
</html>
